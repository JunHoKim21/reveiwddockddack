<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>리뷰뚝딱 설정</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; width: 300px; padding: 15px; margin: 0; background-color: #f9f9f9; }
        h3 { margin-top: 0; color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #555; font-size: 14px; }
        input[type="text"], select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { margin-top: 15px; width: 100%; padding: 10px; background-color: #2bced6; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #21aeb5; }
        #status { margin-top: 10px; color: green; font-size: 12px; text-align: center; height: 15px; }
    </style>
</head>
<body>
    <h3>🧚 리뷰뚝딱 설정</h3>
    <label for="storeName">가게 이름</label>
    <input type="text" id="storeName" placeholder="예: 마포갈비">

    <label for="tone">답글 톤앤매너</label>
    <select id="tone">
        <option value="친절하게">친절하게</option>
        <option value="유머러스하게">유머러스하게</option>
        <option value="감성적으로">감성적으로</option>
        <option value="정중하게">정중하게</option>
    </select>

    <button id="saveBtn">저장하기</button>
    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
