<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>리뷰뚝딱 설정</title>
</head>
<body>
  <div class="container">
    <h2>리뷰뚝딱 🪄</h2>
    <p class="subtitle">AI가 사장님의 마음을 담아 답글을 써드려요</p>
    
    <div class="input-group">
      <label for="storeName">가게 이름</label>
      <input type="text" id="storeName" placeholder="예: 맛있는 치킨집">
    </div>

    <div class="input-group">
      <label for="tone">답글 톤앤매너</label>
      <select id="tone">
        <option value="친절하게">친절하게</option>
        <option value="공감형">공감형</option>
        <option value="유머러스하게">유머러스하게</option>
        <option value="단호한 사이다">단호한 사이다 (진상 대처용)</option>
      </select>
    </div>

    <div class="input-group">
      <label for="signature">사장님 고정 서명 (선택)</label>
      <textarea id="signature" placeholder="예: 감사합니다. 맛있는 치킨집 올림" rows="2" style="width: 100%; box-sizing: border-box; resize: vertical; border: 1px solid #d1d5db; border-radius: 6px; padding: 10px; font-size: 14px; font-family: sans-serif;"></textarea>
    </div>

    <div class="input-group">
      <label for="licenseKey">라이선스 키</label>
      <input type="text" id="licenseKey" placeholder="라이선스 키 입력">
    </div>

    <button id="saveBtn">설정 저장</button>
    <div id="statusMessage"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
